  <style>
    html, body { margin: 0; padding: 0; background: #0e0e0e; }
    /* THE CORNER STACK. Three fixed links, shared rule rather than three near-copies.
       On mobile they used to be three stacked pills at bottom 12/52/92px, each ~150px
       wide in a 390px viewport — permanently covering ~130px of body prose at every
       scroll position, with one of the obscured links being the affiliate recruiter.
       Below 720px they become a single centred row that sits BELOW the content instead
       of on top of it. Heights raised from 29px to the 44px touch floor. */
    #textref, #quickref, #afflink {
      position: fixed; right: 12px; z-index: 2;
      display: inline-flex; align-items: center; min-height: 44px;
      background: #141414; color: #00ff41; border: 1px solid #2a2a2a;
      border-radius: 6px; padding: 0 14px; text-decoration: none;
      font: 500 13px/1 ui-sans-serif, system-ui, sans-serif;
    }
    #textref { bottom: 12px; }
    #afflink { bottom: 64px; color: #84967e; }
    #quickref { bottom: 116px; }
    #textref:hover, #quickref:hover { border-color: #00ff41; }
    #afflink:hover { border-color: #00ff41; color: #00ff41; }

    @media (max-width: 720px) {
      /* Static, in flow, side by side — nothing overlaps the documentation. */
      #textref, #quickref, #afflink {
        position: static; right: auto; bottom: auto;
        margin: 6px 4px 0; min-height: 44px;
      }
      .docs-corner {
        display: flex; flex-wrap: wrap; justify-content: center;
        padding: 12px 8px 20px; background: #0e0e0e;
        border-top: 1px solid #2a2a2a;
      }
    }
    @media (min-width: 721px) { .docs-corner { display: contents; } }

    /* Pre-hydration splash so the page never flashes white on a slow load. */
    #boot {
      position: fixed; inset: 0; display: grid; place-items: center;
      background: #0e0e0e; color: #84967e; z-index: 1;
      font: 500 14px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    #boot .dot {
      width: 10px; height: 10px; border-radius: 50%; background: #00ff41;
      margin: 0 auto 12px; animation: p 1.1s ease-in-out infinite;
    }
    @keyframes p { 0%,100% { opacity: .25; transform: scale(.85); } 50% { opacity: 1; transform: scale(1); } }
    @media (prefers-reduced-motion: reduce) { #boot .dot { animation: none; opacity: .8; } }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
  <script>
    // Remove the splash once Scalar has painted, and fall back to a plain link
    // if the CDN is blocked so the page is never a dead end.
    (function () {
      var boot = document.getElementById('boot');
      var done = false;
      function clear() { if (!done && boot) { done = true; boot.remove(); } }
      var obs = new MutationObserver(function () {
        if (document.querySelector('.scalar-app, [class*="scalar"]')) { clear(); obs.disconnect(); }
      });
      obs.observe(document.body, { childList: true, subtree: true });
      setTimeout(function () {
        if (done) return;
        obs.disconnect();
        if (boot) {
          boot.innerHTML =
            '<div style="text-align:center;max-width:44ch">' +
            '<p style="color:#e6edf3">The interactive reference could not load.</p>' +
            '<p><a style="color:#00ff41;font-size:1.05rem" href="reference.html">Read the full text reference</a></p>' +
            '<p style="color:#84967e;font-size:.9rem">Or download the ' +
            '<a style="color:#00ff41" href="openapi.yaml">OpenAPI spec</a>.</p>' +
            '</div>';
        }
      }, 8000);
    })();
  </script>
