    /* Pre-hydration splash so the page never flashes white on a slow load. */
    #boot {
      position: fixed; inset: 0; display: grid; place-items: center;

<body>
  <div id="boot"><div><div class="dot"></div>Loading API reference…</div></div>

  <!-- The interactive reference renders client-side. No major AI crawler executes
       JavaScript (GPTBot, ClaudeBot, PerplexityBot, OAI-SearchBot all read raw HTML
       only), so without this the entire API reference is invisible to answer engines.
       reference.html carries the same content as plain server-rendered HTML. -->
  <noscript>

    data-configuration='{"theme":"purple","darkMode":true,"hideDownloadButton":false,"searchHotKey":"k","metaData":{"title":"Live Tennis API — API Reference"}}'>
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
  <script>
    // Remove the splash once Scalar has painted, and fall back to a plain link
    // if the CDN is blocked so the page is never a dead end.
    (function () {
      var boot = document.getElementById('boot');
      var done = false;
      function clear() { if (!done && boot) { done = true; boot.remove(); } }
      var obs = new MutationObserver(function () {
        if (document.querySelector('.scalar-app, [class*="scalar"]')) { clear(); obs.disconnect(); }
      });
      obs.observe(document.body, { childList: true, subtree: true });
      setTimeout(function () {
        if (done) return;
        obs.disconnect();
        if (boot) {
          boot.innerHTML =
            '<div style="text-align:center;max-width:44ch">' +
            '<p style="color:#e6edf3">The interactive reference could not load.</p>' +
            '<p><a style="color:#3ee07a;font-size:1.05rem" href="reference.html">Read the full text reference</a></p>' +
            '<p style="color:#93a1b3;font-size:.9rem">Or download the ' +
            '<a style="color:#3ee07a" href="openapi.yaml">OpenAPI spec</a>.</p>' +
            '</div>';
        }
      }, 8000);
    })();
  </script>
